[config]
schemaVersion = "0.0.1"

[package]
namespace = "Zehs"
name = "Whiteboard"
description = "[v81] Adds a new whiteboard store item that you can write on!"
websiteUrl = "https://github.com/ZehsTeam/LethalCompany-Whiteboard"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack = "5.4.2305"
Evaisa-FixPluginTypesSerialization = "1.1.4"
Evaisa-LethalLib = "1.2.0"

[build]
icon = "./icon.png"
readme = "../../README.md"
outdir = "./Packages"

[[build.copy]]
source = "./CHANGELOG.md"
target = "/"

[[build.copy]]
source = "../../Whiteboard/bin/Release/netstandard2.1/com.github.zehsteam.Whiteboard.dll"
target = "BepInEx/plugins/"

[[build.copy]]
source = "../../Whiteboard/bin/Release/netstandard2.1/whiteboard_assets"
target = "BepInEx/plugins/"
